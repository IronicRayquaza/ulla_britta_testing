name: CI Pipeline

on: [push]

jobs:
  build-and-validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Validate Extension Structure
        run: |
          echo "Validating extension manifest..."
          if [ -f "manifest.json" ]; then
            echo "Manifest found. Structure is valid."
          else
            echo "Error: manifest.json is missing!"
            exit 1
          fi